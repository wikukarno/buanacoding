baseURL = "https://www.buanacoding.com/"
languageCode = "en"
title = "Level Up Your Code | Web & App Development Tutorials"
defaultContentLanguage = "en"
enableGitInfo = true
# Keep default language (English) at root URL, non-default languages under subfolders (e.g., /id/)
defaultContentLanguageInSubdir = false

# Suppress raw HTML warnings
ignoreLogs = ['warning-goldmark-raw-html']

# Minify settings - disable JSON minify to avoid UTF-8 issues
[minify]
  disableJSON = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false

# Theme settings
[markup]
  [markup.highlight]
    noClasses = false
    style = "github"
    lineNos = false
    lineNumbersInTable = false
    tabWidth = 2

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow raw HTML in markdown

[params.giscus]
  repo = "wikukarno/buanacoding"
  repoID = "R_kgD0Oj4jAw"
  category = "General"
  categoryID = "DIC_kwD0Oj4jA84Cr_fx"


# Tags taxonomy
[taxonomies]
  tag = "tags"

# Pagination config
[pagination]
  pagerSize = 6

# Sitemap settings
[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

# Enable robots.txt and sitemap output
[outputs]
  home = ["HTML", "RSS", "JSON", "SITEMAP", "ROBOTS"]
  section = ["HTML", "RSS", "SITEMAP"]
  taxonomy = ["HTML", "SITEMAP"]

# Enable metaData for SEO
[params]
  author = "Wiku Karno"
  description = "Want to code better? Buana Coding provides high-quality tutorials, tips, and developer tools. From fixing bugs to building full apps, start learning today."
  defaultImage = "https://www.buanacoding.com/og-image.jpg"
  # Tags to show in navbar (allowlist). Fallback shows up to 6 popular tags.
  navTags = ["General", "Go", "Laravel", "Linux", "Python", "Security"]

  # Sidebar tags behavior
  [params.tags]
    # Minimum number of posts for a tag to be shown in sidebar (fallback mode)
    minCount = 2
    # Maximum number of tags to show in sidebar (fallback mode)
    maxSidebar = 20
    # Optional curated allowlist for sidebar (uncomment to enforce)
    # sidebarTags = ["Go", "Linux", "Laravel", "Python", "Security"]

  # Ads and consent configuration
[params.ads]
    # If true, render real AdSense units even when using `hugo server`
    forceLive = false

  [params.adsense]
    # AdSense publisher + slot IDs per placement.
    # Each placement MUST have its own slot. Google drops duplicate push()
    # calls silently — sharing one slot across placements means only the
    # first one renders and the rest stay blank.
    publisher = "ca-pub-3149036684216973"
    slot_in_article = "2492895769"
    # 2nd in-article slot — only renders on posts >1500 words. Leave empty
    # to disable; fill with a fresh AdSense unit ID once created.
    slot_in_article_2 = ""
    slot_multiplex = "7106179106"
    slot_header = "9616560861"
    slot_in_feed = "1061460250"
    slot_sidebar = "5070862457"
    slot_footer = "3757780786"
    slot_mobile = "7337933147"
    slot_search = "5101510409"
    slot_bottom_article = "2452752606"

  [params.verification]
    # Webmaster verification codes. Leave empty to omit the meta tag.
    google = ""   # Google Search Console: Settings → Ownership verification → HTML tag
    bing = ""     # Bing Webmaster Tools → Meta tag method
    yandex = ""   # optional

  [params.consent]
    # Default Consent Mode values. Keep "denied" — Funding Choices CMP will
    # upgrade to "granted" after the user accepts. Default-granted makes the
    # CMP useless for EU/UK/CH visitors (GDPR non-compliant).
    ad_storage = "denied"
    ad_user_data = "denied"
    ad_personalization = "denied"
    analytics_storage = "denied"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "Level Up Your Code | Web & App Development Tutorials"
  [languages.id]
    languageName = "Indonesia"
    weight = 2
    title = "Level Up Your Code | Tutorial Web & App Development"
