{{/* Adblock notice — dismissable banner (bait-only detection). Non-blocking, no content blur. */}}
{{ if or (not hugo.IsServer) (.Site.Params.ads.forceLive) }}
<div style="position:absolute;left:0;top:0;width:1px;height:1px;overflow:hidden;pointer-events:none;opacity:0;">
  <div id="_abd1" class="ad-banner adsbox" style="width:300px;height:250px;"></div>
  <div id="_abd2" class="textad ad-placement" style="width:728px;height:90px;"></div>
</div>
<script>
(function(){
  var w=window,d=document;
  var DISMISS_KEY='_abDismissedUntil';
  var DISMISS_DAYS=7;

  function isHidden(el){
    if(!el)return true;
    if(el.offsetParent===null&&el.offsetHeight===0)return true;
    var s=w.getComputedStyle(el);
    if(!s)return true;
    if(s.display==='none'||s.visibility==='hidden')return true;
    return false;
  }
  function checkBaits(){
    var a=d.getElementById('_abd1');
    var b=d.getElementById('_abd2');
    return isHidden(a)||isHidden(b);
  }
  function isDismissed(){
    try{
      var until=parseInt(localStorage.getItem(DISMISS_KEY)||'0',10);
      return until>Date.now();
    }catch(e){return false;}
  }
  function dismiss(){
    try{
      localStorage.setItem(DISMISS_KEY,String(Date.now()+DISMISS_DAYS*86400000));
    }catch(e){}
  }
  function showBanner(){
    if(d.getElementById('_abBanner'))return;
    var bar=d.createElement('div');
    bar.id='_abBanner';
    bar.innerHTML='<div style="position:fixed;top:0;left:0;right:0;z-index:9998;background:#1f2937;color:#fff;padding:10px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:Inter,system-ui,sans-serif;font-size:14px;">'
      +'<div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'
      +'<span style="flex:1;min-width:220px;line-height:1.5;">'
      +'<strong style="color:#fbbf24;">Ad blocker detected.</strong> '
      +'Konten ini gratis berkat iklan. Pertimbangkan disable adblock untuk dukung kami.'
      +'</span>'
      +'<button id="_abReload" style="background:#0f7ea9;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">Sudah Disable, Reload</button>'
      +'<button id="_abDismiss" style="background:transparent;color:#d1d5db;border:1px solid #4b5563;padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;">Tutup</button>'
      +'</div></div>';
    d.body.appendChild(bar);
    d.getElementById('_abReload').onclick=function(){location.reload();};
    d.getElementById('_abDismiss').onclick=function(){dismiss();bar.remove();};
  }
  function detect(){
    if(isDismissed())return;
    if(checkBaits())showBanner();
  }
  if(d.readyState==='loading'){d.addEventListener('DOMContentLoaded',function(){setTimeout(detect,1000);});}
  else{setTimeout(detect,1000);}
})();
</script>
{{ end }}
